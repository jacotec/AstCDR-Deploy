# AstCDR — example configuration.
# The real config.yaml is gitignored; secrets come via ${ENV} from .env.
app:
  base_url: "https://cdr.example.com"   # REQUIRED: public URL (OIDC callback!)
  secret_key: "${APP_SECRET_KEY}"       # session signature
  timezone: "Europe/Berlin"
  session_lifetime_minutes: 0           # 0 = no timeout (until logout/browser close); >0 = auto-logout after minutes
  # cookie_secure: false                # ONLY for direct HTTP testing (without TLS proxy);
                                         # omit -> Secure is automatic for an https base_url

source_db:                              # FreePBX asteriskcdrdb — READ ONLY
  # On the same host as FreePBX? Then use the local socket (robust, no network needed):
  # socket: "/var/run/mysqld/mysqld.sock"
  host: "10.0.0.5"                      # otherwise the PBX LAN IP (mind bind-address/firewall!)
  port: 3306
  name: "asteriskcdrdb"
  user: "cdrjournal_ro"
  password: "${SOURCE_DB_PASSWORD}"

cache_db:                               # Postgres container (local, 127.0.0.1 only)
  # Default compose runs in host mode -> the cache listens on loopback.
  # The isolated compose (see CONFIGURATION.md) sets CACHE_DB_HOST/PORT itself,
  # so this same file works for BOTH variants — don't hardcode a host here.
  host: "${CACHE_DB_HOST:-127.0.0.1}"
  port: ${CACHE_DB_PORT:-5432}          # set CACHE_DB_PORT in .env if 5432 is taken
  name: "cdrjournal"
  user: "cdrjournal"
  password: "${CACHE_DB_PASSWORD}"

ingest:
  interval_seconds: 15                  # how often new calls are read in
  lookback_minutes: 10                  # overlap window for late-arriving legs
  batch_size: 5000
  initial_backfill_days: 365            # whole history on the first run
  backfill_chunk_days: 7                # backfill in chunks (does not block)
  max_open_call_minutes: 240            # longest call guaranteed to be captured in
                                        # full (keeps the read window open while a
                                        # call is in progress); raise for very long
                                        # conference calls
  heartbeat_stale_seconds: 120          # after this long without an ingest run, the
                                        # web "Sync" badge shows offline (data may be stale)

auth:
  mode: "both"                          # oidc | local | both
  oidc:
    # Example: Authentik. Register the callback in the IdP: {base_url}/auth/callback
    issuer: "https://auth.example.com/application/o/cdr-journal/"
    # Empty server_metadata_url -> issuer + /.well-known/openid-configuration (OIDC standard,
    # fits Authentik/Keycloak). NEXTCLOUD ("OIDC Identity Provider") differs and needs the
    # discovery URL EXPLICITLY, e.g.:
    #   server_metadata_url: "https://cloud.example.com/index.php/apps/oidc/openid-configuration"
    # (the exact URL is in your Nextcloud OIDC settings; open it in a browser -> it must
    #  return JSON with authorization_endpoint/token_endpoint.)
    # server_metadata_url: ""
    client_id: "cdr-journal"
    client_secret: "${OIDC_CLIENT_SECRET}"
    scopes: ["openid", "profile", "email", "groups"]
    username_claim: "preferred_username"
    groups_claim: "groups"
    admin_groups: ["admin"]             # members of these groups become admins
    button_label: "Authentik"           # text on the login button
    # Link an OIDC login to an EXISTING account by email even without a positive
    # `email_verified` claim — authentik always sends it as false. Off by default:
    # with an IdP that allows self-registration, someone could sign up with a
    # colleague's address and take over their account on first login. Turn it on only
    # when addresses are assigned administratively — e.g. temporarily while migrating
    # to another IdP, so existing users keep their accounts and settings instead of
    # getting a duplicate.
    link_by_unverified_email: false
    # WHO is allowed to sign in is controlled in the IdP (client assignment) — not here.
  local:
    enabled: true                       # break-glass local login
    # Generate a hash:  docker compose run --rm cdrj-web python -m app.auth.local "mypassword"
    # Login works by username OR email. The email links this user to the OIDC
    # login (same email -> same identity, same prefs).
    #
    # IMPORTANT: enter the bcrypt hash RAW here (in quotes) — NOT via ${ENV}/.env!
    # bcrypt hashes contain '$', which Docker Compose interprets as variables in
    # .env and destroys the hash. Compose does not touch config.yaml; our loader
    # only replaces ${...} patterns.
    users:
      - username: "admin"
        email: "admin@example.com"
        display_name: "Administrator"
        password_hash: "$2b$12$REPLACE_with_the_output_of_app.auth.local"
        role: "admin"

trunks:
  known: ["easybell", "telekom", "sipgate"]
  labels:
    telekom: "Telekom"
    easybell: "easybell"
  fallback_nonnumeric_is_trunk: true

geo:                                    # country/city for external numbers (offline, libphonenumber)
  region: "DE"                          # default country for nationally-formatted numbers (e.g. "0221...")
  lang: "de"                            # language of the location description (landline -> city)

journal:
  # Hide non-telephony events from the journal. Applied at DISPLAY time (not during
  # ingest) -> toggleable in the GUI without re-reading. The GUI writes changes back here.
  hide:
    contexts: ["door-alle"]   # e.g. door/paging contexts of your PBX
    dst_values: []            # e.g. ["s"] for Asterisk placeholder destinations

stats:
  # Number of rows in the "Top callers" and "Top destinations" lists on the
  # Statistics page (one value for BOTH lists). Range 10..100; out-of-range is
  # clamped. Also applies to the PDF/CSV export of the statistics.
  top_n: 10

email:                                  # optional: SMTP for cost/quota/admin warnings
  enabled: false                        # master switch (also needs host + from_email)
  host: "smtp.example.com"
  port: 587
  security: "tls"                       # tls (STARTTLS) | ssl (implicit) | none
  username: "${SMTP_USER}"              # optional (relays without auth)
  password: "${SMTP_PASS}"              # via ${ENV}; never written to config.yaml
  from_email: "cdr@example.com"
  from_name: "Call Journal"
  timeout: 10                           # seconds; a dead SMTP must not stall ingest
  admin_alert_to: []                    # extra recipients for ADMIN error mails only
                                        # (independent of the per-user checkboxes)

ui:
  brand_title: "Call Journal"
  page_size: 100
  default_range_days: 7
  live_refresh_seconds: 10              # auto refresh (GUI poll)
  theme: "auto"                         # auto | light | dark
