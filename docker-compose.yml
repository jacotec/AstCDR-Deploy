# AstCDR — PRODUCTION compose (prebuilt images, no build).
# For deployment to other installations: images are pulled from the (public)
# registry, NO sources are required.
#
# Quick start:
#   cp .env.example .env                 # fill in (secrets)
#   cp config.example.yaml config.yaml   # adapt to your own FreePBX
#   docker compose up -d
#
# Pin the image version via .env (CDRJ_IMAGE), otherwise the default below applies.
#
# NETWORK MODE host: the containers use the PBX's network stack directly — no
# bridge network, no NAT, NO iptables rules. This is the right mode when AstCDR
# runs ON the FreePBX itself:
#   1. A `fwconsole restart` cannot cut the containers off the network — there
#      are no Docker rules left for it to wipe.
#   2. The web port goes through INPUT and is therefore governed by the FreePBX
#      firewall, instead of bypassing it via DNAT. Open it there:
#      Firewall -> Custom Services -> TCP ${WEB_PORT} (default 3000), zone Local.
#
# Postgres runs LOCALLY on 127.0.0.1 only (never exposed). If port 5432 is already
# taken on this host, set CACHE_DB_PORT in .env.
#
# Running AstCDR on a DIFFERENT host than the PBX (or you don't want host mode)?
# Use docker-compose.isolated.yml instead — see CONFIGURATION.md.
services:
  cdrj-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: cdrjournal
      POSTGRES_USER: cdrjournal
      POSTGRES_PASSWORD: ${CACHE_DB_PASSWORD}
      # Container logs and manual `psql` in local time instead of UTC (a container
      # does NOT inherit the host timezone). Keep this in sync with `app.timezone`
      # in config.yaml — the web/ingest containers derive theirs from there.
      TZ: ${TZ:-Europe/Berlin}
    # Loopback ONLY: the cache is for our own containers. Without this, host mode
    # would expose Postgres on the LAN. Change the port via .env if 5432 is taken.
    command: ["postgres", "-c", "listen_addresses=127.0.0.1",
              "-c", "port=${CACHE_DB_PORT:-5432}"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdrjournal -d cdrjournal -h 127.0.0.1 -p ${CACHE_DB_PORT:-5432}"]
      interval: 5s
      timeout: 3s
      retries: 10

  cdrj-web:
    image: ${CDRJ_IMAGE:-ghcr.io/jacotec/astcdr:latest}
    restart: unless-stopped
    network_mode: host
    # No `ports:` — it has no effect in host mode. The port goes straight into
    # uvicorn. Bound to 0.0.0.0 so a reverse proxy on the LAN can reach it; access
    # is governed by the FreePBX firewall (Custom Service), not by the bind address.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0",
              "--port", "${WEB_PORT:-3000}", "--proxy-headers"]
    env_file: [.env]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./costs.yaml:/app/costs.yaml:ro    # tariffs (must exist; empty file = no costs)
      # License: drop an astcdr.lic into the ./license folder -> full version.
      # Empty folder = free version. The compose file never needs to change.
      - ./license:/app/license:ro
    depends_on:
      cdrj-postgres:
        condition: service_healthy

  cdrj-ingest:
    image: ${CDRJ_IMAGE:-ghcr.io/jacotec/astcdr:latest}
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "app.ingest.worker"]
    env_file: [.env]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./costs.yaml:/app/costs.yaml:ro    # tariffs (must exist; empty file = no costs)
      - ./license:/app/license:ro   # license folder (empty = free version)
      # FreePBX MariaDB socket (same host). Adjust the path if needed; only
      # required when source_db.socket is set in config.yaml.
      # Mount the DIRECTORY, not the socket file: a file bind-mount binds the INODE.
      # After a MariaDB restart/upgrade the server creates a NEW socket, and the
      # container would keep pointing at the old, dead one (Errno 111 "Connection
      # refused", never heals by itself). No :ro — connecting to a Unix socket
      # requires write permission.
      - /var/run/mysqld:/var/run/mysqld
    depends_on:
      cdrj-postgres:
        condition: service_healthy

volumes:
  pgdata: {}
